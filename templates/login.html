<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>body { background: #0f0f23; }</style>
</head>
<body class="min-h-screen flex items-center justify-center text-gray-100 px-4">
    <div class="max-w-sm w-full">
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">🔒</div>
            <h1 class="text-xl font-bold text-white">管理后台登录</h1>
            <p class="text-gray-500 text-sm mt-1">输入管理密码进入</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm px-4 py-2.5 rounded-xl mb-4 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/admin/login" class="space-y-4">
            <input type="password" name="password" autofocus required
                   placeholder="请输入管理密码"
                   class="w-full bg-[#1a1a2e] border border-white/10 rounded-xl px-4 py-3 text-white text-center text-lg tracking-widest placeholder:text-gray-600 placeholder:tracking-normal placeholder:text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl transition">
                进入管理
            </button>
        </form>

        <div class="text-center mt-6">
            <a href="/" class="text-gray-600 hover:text-gray-400 text-sm">
                <i class="fa fa-arrow-left"></i> 返回首页
            </a>
        </div>
    </div>
</body>
</html>
