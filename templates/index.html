<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提醒管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        body { background: #0f0f23; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-gray-100 px-4">
    <div class="max-w-md w-full text-center space-y-8">
        <!-- Logo -->
        <div>
            <div class="text-6xl mb-4">📋</div>
            <h1 class="text-2xl font-bold text-white">提醒管理系统</h1>
            <p class="text-gray-500 text-sm mt-2">行程提醒 · 每日任务 · 微信群自动推送</p>
        </div>

        <!-- 两个入口 -->
        <div class="space-y-4">
            <a href="/admin"
               class="card-hover block bg-gradient-to-r from-indigo-600 to-indigo-500 rounded-2xl px-6 py-5 text-left">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center text-2xl shrink-0">
                        🔧
                    </div>
                    <div>
                        <div class="font-bold text-lg text-white">老师管理</div>
                        <div class="text-indigo-200 text-sm mt-0.5">创建提醒、编辑内容、管理任务</div>
                    </div>
                    <i class="fa fa-chevron-right text-indigo-300 ml-auto"></i>
                </div>
            </a>

            <a href="/student"
               class="card-hover block bg-gradient-to-r from-emerald-600 to-emerald-500 rounded-2xl px-6 py-5 text-left">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center text-2xl shrink-0">
                        👀
                    </div>
                    <div>
                        <div class="font-bold text-lg text-white">学员查看</div>
                        <div class="text-emerald-200 text-sm mt-0.5">查看行程安排、每日任务打卡</div>
                    </div>
                    <i class="fa fa-chevron-right text-emerald-300 ml-auto"></i>
                </div>
            </a>
        </div>

        <!-- 底部说明 -->
        <div class="text-gray-600 text-xs space-y-1 pt-4">
            <p>老师填写内容后，微信群内自动推送提醒</p>
            <p>每天早上 8:00 + 晚上 21:00 定时提醒</p>
        </div>
    </div>
</body>
</html>
